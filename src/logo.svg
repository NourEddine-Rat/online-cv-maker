<svg width="280" height="44" viewBox="0 0 280 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon: Abstract document/CV shape -->
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Rounded rectangle document -->
  <rect x="2" y="4" width="26" height="34" rx="4" fill="url(#logoGrad)" opacity="0.9"/>
  <!-- Document lines -->
  <rect x="7" y="12" width="16" height="2" rx="1" fill="white" opacity="0.9"/>
  <rect x="7" y="18" width="12" height="2" rx="1" fill="white" opacity="0.7"/>
  <rect x="7" y="24" width="14" height="2" rx="1" fill="white" opacity="0.5"/>
  <!-- Check mark circle -->
  <circle cx="26" cy="10" r="7" fill="#06b6d4"/>
  <path d="M22.5 10L25 12.5L29.5 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text: Online CV Maker -->
  <text x="40" y="28" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="20" fill="#1e293b">
    <tspan fill="url(#logoGrad)">Online</tspan>
    <tspan fill="#1e293b"> CV </tspan>
    <tspan fill="url(#logoGrad)">Maker</tspan>
